<style>
body{

    padding:0;

.container{
width:75%;
margin:40px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
text-align:center;
color:#2e7d32;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:12px;
text-align:center;
border-bottom:1px solid #ddd;
}

th{
background:#4CAF50;
color:white;
}

img{
width:60px;
height:60px;
}

.total{
text-align:right;
font-size:18px;
margin-top:15px;
}

.buttons{
text-align:center;
margin-top:20px;
}

button{
padding:12px 25px;
margin:10px;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

.place{
background:#4CAF50;
color:white;
}

.place:hover{
background:#2e7d32;
}

.cancel{
background:#e53935;
color:white;
}

.cancel:hover{
background:#c62828;
}
</style>
