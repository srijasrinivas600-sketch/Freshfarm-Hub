<!DOCTYPE html>
<html>
<head>
<title>Feedback</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f3f5f7;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:40px;
border-radius:15px;
width:400px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

h2{
color:#2E7D32;
}

textarea{
width:100%;
height:100px;
padding:10px;
border-radius:10px;
border:1px solid #ccc;
resize:none;
font-size:14px;
}

/* Stars */

.stars{
margin:15px 0;
font-size:30px;
cursor:pointer;
}

.star{
color:#ccc;
transition:0.3s;
}

.star.active{
color:gold;
}

/* Button */

button{
margin-top:15px;
padding:10px 20px;
border:none;
background:#2E7D32;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#1B5E20;
}

/* Thank you message */

#thanks{
margin-top:20px;
font-size:18px;
color:#2E7D32;
display:none;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h2>Feedback & Review</h2>

<textarea placeholder="Write your feedback..."></textarea>

<div class="stars">

<span class="star" onclick="rate(1)">★</span>
<span class="star" onclick="rate(2)">★</span>
<span class="star" onclick="rate(3)">★</span>
<span class="star" onclick="rate(4)">★</span>
<span class="star" onclick="rate(5)">★</span>

</div>

<button onclick="submitFeedback()">Submit</button>

<div id="thanks">🙏 Thank you for your feedback!</div>

</div>

<script>

function rate(n){

let stars=document.querySelectorAll(".star");

stars.forEach((star,index)=>{
if(index<n){
star.classList.add("active");
}else{
star.classList.remove("active");
}
});

}

function submitFeedback(){

document.getElementById("thanks").style.display="block";
window.location.href="4mod.html";
}

</script>

</body>
</html>
