<!DOCTYPE html>
<html>
<head>
    <title>FreshFarm Hub</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Arial', sans-serif;
        }

        .hero {
            position: relative;
            width: 100%;
            height: 100vh;
            background: url('https://wallpapers.com/images/hd/verdant-rice-fields-and-farm-surrounding-small-village-8uuv5wg8j0tqwpo5.jpg') no-repeat center center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            color: white;
        }

        .hero img {
            width: 200px;
            border-radius: 50%;
            border: 5px solid white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .hero h1 {
            margin-top: 20px;
            font-size: 48px;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
        }

        @media (max-width: 600px) {
            .hero img { width: 150px; }
            .hero h1 { font-size: 32px; }
        }
    </style>
</head>
<body>
    <div class="hero">
        <img src="https://img.freepik.com/premium-photo/indian-farmer-field-garden-cultivating-vegetables-cartoon-illustration-school-story-bo_981829-12281.jpg?semt=ais_user_personalization&w=740&q=80" alt="Farmer with Nagali">
        <h1>FreshFarm Hub</h1>
        <button class="start-btn" onclick="goto()"></button>
    </div>
    <script>
        function goto() {
            window.location.href = "9.html";
        }
    </script>
</body>
</html>
