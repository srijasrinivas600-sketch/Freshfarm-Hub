<!DOCTYPE html>
<html>
<head>
<title>Fresh Farm Hub - Choose Language</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f3f5f7;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
text-align:center;
width:300px;
}

h2{
color:#2E7D32;
margin-bottom:20px;
}

.lang-option{
margin:10px 0;
font-size:18px;
}

button{
margin-top:20px;
padding:10px 20px;
border:none;
border-radius:10px;
background:#2E7D32;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#1b5e20;
}
</style>
</head>

<body>

<div class="container">

<h2>Choose Language</h2>

<div class="lang-option">
<input type="radio" name="language" value="telugu"> తెలుగు
</div>

<div class="lang-option">
<input type="radio" name="language" value="english"> English
</div>

<button onclick="submitLanguage()">Submit</button>

</div>

<script>

function submitLanguage(){

let lang = document.querySelector('input[name="language"]:checked');

if(!lang){
alert("Please select a language");
return;
}

if(lang.value === "telugu"){
alert("మీరు తెలుగు ఎంపిక చేశారు");
window.location.href = "telugu_home.html"; 
}

if(lang.value === "english"){
alert("You selected English");
window.location.href = "admin.html"; 
}

}

</script>

</body>
</html>
