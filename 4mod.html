<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f3f5f7;
}

/* Header */

.header{
background:#2E7D32;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:20px;
}

/* Profile icon */

.profile{
width:35px;
height:35px;
border-radius:50%;
background:white;
display:flex;
justify-content:center;
align-items:center;
color:#2E7D32;
font-weight:bold;
}

/* Cards container */

.container{
padding:20px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

/* Cards */

.card{
background:white;
border-radius:15px;
padding:15px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
transition:0.3s;
cursor:pointer;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:70px;
height:70px;
margin-bottom:8px;
}

.card h3{
margin:0;
color:#333;
font-size:18px;
}

/* Details section */

.details{
margin:20px;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.details h2{
color:#2E7D32;
}

.person{
padding:8px;
border-bottom:1px solid #ddd;
}

</style>
</head>

<body>

<div class="header">

<div>Dashboard</div>

<div class="profile">👤</div>

</div>

<div class="container">

<div class="card" onclick="showCommunity()">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR3QhZDJtRV8_Sw4u2zU9fYQQQIoJebW2fHKw&s">
<h3>Community</h3>
</div>

<div class="card" onclick="showFarmers()">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTKgQaY_j9KfBy9NdH1T8h1rB0mITbNK02STA&s">
<h3>Farmers</h3>
</div>

<div class="card">
<img src="https://www.shutterstock.com/image-photo/healthy-plate-diagram-should-be-600w-2659164811.jpg">
<h3>Items</h3>
</div>

<div class="card">
<img src="https://cdn-icons-png.flaticon.com/512/565/565375.png">
<h3>My Orders</h3>
</div>

</div>

<div class="details" id="details">
<h2>Click a card to see details</h2>
</div>

<script>

function showCommunity(){

document.getElementById("details").innerHTML=`

<h2>Community Members</h2>

<div class="person">Rahul - Age 25</div>
<div class="person">Sneha - Age 22</div>
<div class="person">Arjun - Age 28</div>
<div class="person">Priya - Age 24</div>

`;

}

function showFarmers(){

document.getElementById("details").innerHTML=`

<h2>Farmers & Their Crops</h2>

<div class="person">Ramesh - Bottle Gourd Farmer</div>
<div class="person">Suresh - Drumstick Farmer</div>
<div class="person">Lakshmi - Lady's Finger Farmer</div>
<div class="person">Mahesh - Brinjal Farmer</div>

`;
  setTimeout(() => {
        window.location.href = "community.html";
    }, 1500);

}

</script>

</body>
</html>
