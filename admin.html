<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>

body{
    font-family: Arial;
    margin:0;
    background:#f4f4f4;
    text-align:center;
}

h1{
    margin-top:30px;
}

.admin-container{
    display:flex;
    justify-content:center;
    gap:60px;
    margin-top:40px;
}

.admin{
    cursor:pointer;
}

.admin img{
    width:120px;
    height:120px;
    border-radius:50%;
    border:4px solid #2E7D32;
}

.admin p{
    font-weight:bold;
}

.info-container{
    margin-top:40px;
}

.person-card{
    background:white;
    width:320px;
    margin:20px auto;
    padding:20px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
    text-align:left;
}

</style>

</head>

<body>

</html>
