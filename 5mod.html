<!DOCTYPE html>
<html>
<head>
<title>Vegetables</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f3f5f7;
}

.header{
background:#2E7D32;
color:white;
padding:15px;
font-size:20px;
text-align:center;
}

.search-bar{
padding:10px;
background:white;
text-align:center;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.search-bar input{
width:90%;
padding:10px;
border-radius:20px;
border:1px solid #ccc;
font-size:16px;
}

.main{
display:flex;
}

.categories{
width:30%;
background:white;
padding:15px;
border-right:1px solid #ddd;
}

.categories button{
display:block;
width:100%;
padding:10px;
margin:8px 0;
border:none;
background:#e8f5e9;
border-radius:10px;
cursor:pointer;
}

.items{
width:70%;
padding:15px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.card{
background:white;
border-radius:12px;
padding:10px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:120px;
object-fit:contain;
}

.card h4{
margin:8px 0 4px;
font-size:16px;
}

.price{
color:#2E7D32;
font-weight:bold;
}

/* Cart controls */

.cart-controls{
margin-top:10px;
}

.cart-controls button{
padding:6px 10px;
margin:3px;
border:none;
background:#2E7D32;
color:white;
border-radius:5px;
cursor:pointer;
}

.qty{
font-weight:bold;
margin:0 5px;
}

</style>
</head>

<body>

<div class="header">Vegetables</div>

<div class="search-bar">
<input type="text" placeholder="Search vegetables...">
</div>

<div class="main">

<div class="categories">
<h3>Categories</h3>
<button>Leafy</button>
<button>Root</button>
<button>Seasonal</button>
<button>Organic</button>
</div>

<div class="items">

<!-- Lady's Finger-->

<div class="card">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSe1FTZAbfPe0seHlnC6dX8t_TIXq5zmVNookI6UOCW9OPwxlo_znQab_xlcqbpF5FH4qlAi3tl77tPTQezHmGhoujacm7beGmWxYvLH9_R&s=10">
<h4>Lady's Finger</h4>
<div class="price">₹20 / kg</div>

<div class="cart-controls">
<button onclick="decrease('t')">-</button>
<span id="t" class="qty">0 kg</span>
<button onclick="increase('t')">+</button>
<br>
<button onclick="addCart('Tomato')">Add to Cart</button>
</div>

</div>

<!-- Brinjal-->

<div class="card">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQm57zoB35nEu0O0duU3DwqtE2CdMuhCIov1g&s">
<h4>Brinjal</h4>
<div class="price">₹25 / kg</div>

<div class="cart-controls">
<button onclick="decrease('p')">-</button>
<span id="p" class="qty">0 kg</span>
<button onclick="increase('p')">+</button>
<br>
<button onclick="addCart('Potato')">Add to Cart</button>
</div>

</div>

<script>

function increase(id){

let qty=document.getElementById(id);
let value=parseInt(qty.innerText);

value++;

qty.innerText=value+" kg";

}

function decrease(id){

let qty=document.getElementById(id);
let value=parseInt(qty.innerText);

if(value>0){
value--;
}

qty.innerText=value+" kg";

}

function addCart(item){

alert(item+" added to cart");

}
